<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🌙</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  color: white;
}

/* 🌙 BACKGROUND */
.sky {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(-45deg, #050510, #0b0b2a, #1a1a3d, #070718);
  background-size: 400% 400%;
  animation: shift 12s ease infinite;
  z-index: -6;
}

@keyframes shift {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* ⭐ STARS */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.25;
  animation: floatStars 80s linear infinite;
  z-index: -5;
}

@keyframes floatStars {
  from {transform: translateY(0);}
  to {transform: translateY(-1000px);}
}

/* 💖 OUTLINED HEARTS LAYER */
.hearts {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: -4;
}

.hearts span {
  position: absolute;
  color: rgba(255, 180, 220, 0.35);
  font-size: 18px;
  animation: floatHearts 10s linear infinite;
}

@keyframes floatHearts {
  0% {
    transform: translateY(100vh) translateX(0);
    opacity: 0;
  }
  20% { opacity: 1; }
  100% {
    transform: translateY(-120vh) translateX(40px);
    opacity: 0;
  }
}

/* 💌 ENVELOPE */
.envelope {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  padding: 20px 30px;
  background: #2b2b4a;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 0 25px rgba(120,120,255,0.4);
  transition: 1.5s ease;
  z-index: 10;
}

.envelope:hover {
  transform: translate(-50%,-50%) scale(1.05);
}

/* 💌 LETTER */
.letter {
  opacity: 0;
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%) scale(0.8);
  width: 420px;
  padding: 25px;
  background: rgba(20,20,40,0.95);
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 0 40px rgba(120,120,255,0.4);
  z-index: 10;
}

.letter.show {
  animation: unfold 1.2s ease forwards, breathe 6s ease-in-out infinite;
}

@keyframes unfold {
  from { transform: translate(-50%,-50%) scale(0.8); opacity: 0; }
  to { transform: translate(-50%,-50%) scale(1); opacity: 1; }
}

@keyframes breathe {
  0%,100% { box-shadow: 0 0 35px rgba(120,120,255,0.3); }
  50% { box-shadow: 0 0 60px rgba(180,120,255,0.5); }
}

/* 🎵 BUTTON */
.play-btn {
  margin-top: 15px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #5a5aff;
  color: white;
}

/* 🎧 VISUALS */
.vinyl {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle,#111,#000);
  border: 2px solid #444;
  animation: spin 4s linear infinite;
  z-index: 3;
}

@keyframes spin {
  100% {transform: rotate(360deg);}
}

.heartbeat {
  position: fixed;
  bottom: 35px;
  left: 120px;
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
  animation: beat 1s infinite;
  z-index: 3;
}

@keyframes beat {
  0%,100% {transform: scale(1);}
  50% {transform: scale(1.5);}
}

/* 📸 IMAGES */
.side {
  position: fixed;
  width: 140px;
  height: 140px;
  object-fit: cover;
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(120,120,255,0.4);
  opacity: 0;
  transform: scale(0.8);
  transition: all 1.5s ease;
  z-index: 2;
}

.top { top: 15%; left: 50%; transform: translate(-50%,-50%) scale(0.8); }
.bottom { bottom: 15%; left: 50%; transform: translate(-50%,50%) scale(0.8); }
.left { left: 5%; top: 50%; transform: translateY(-50%) scale(0.8); }
.right { right: 5%; top: 50%; transform: translateY(-50%) scale(0.8); }

.side.show {
  opacity: 1;
  animation: floatMem 6s ease-in-out infinite;
  transform: scale(1);
}

@keyframes floatMem {
  0%,100% { transform: scale(1) translateY(0); }
  50% { transform: scale(1.03) translateY(-8px); }
}

/* MUSIC EFFECT */
body.music-on .sky {
  filter: brightness(1.2);
  transition: 2s ease;
}
</style>

</head>

<body>

<div class="sky"></div>
<div class="stars"></div>

<!-- 💖 OUTLINED HEARTS -->
<div class="hearts" id="hearts"></div>

<!-- 💌 envelope -->
<div class="envelope" id="envelope">
💌 Click to Open
</div>

<!-- 💌 letter -->
<div class="letter" id="letter">

<h1>To My Favorite Person 🌙</h1>
<p id="text"></p>

<button class="play-btn" onclick="playMusic()">▶ Play Cheesy Song</button>
</div>

<!-- 📸 images -->
<img src="img1.jpg" class="side top" id="img1">
<img src="img2.jpg" class="side left" id="img2">
<img src="img3.jpg" class="side bottom" id="img3">
<img src="img4.jpg" class="side right" id="img4">

<!-- 🎵 music -->
<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<div class="vinyl"></div>
<div class="heartbeat"></div>

<script>

let music = document.getElementById("music");
let envelope = document.getElementById("envelope");
let letter = document.getElementById("letter");

/* 💖 OUTLINED HEARTS GENERATOR */
function createHearts() {
  const hearts = document.getElementById("hearts");

  for (let i = 0; i < 25; i++) {
    let s = document.createElement("span");
    s.innerHTML = "♡";
    s.style.left = Math.random() * 100 + "%";
    s.style.fontSize = (14 + Math.random() * 16) + "px";
    s.style.animationDuration = (8 + Math.random() * 6) + "s";
    s.style.opacity = Math.random() * 0.4;
    hearts.appendChild(s);
  }
}
createHearts();

/* 📸 images */
const images = [
  document.getElementById("img1"),
  document.getElementById("img2"),
  document.getElementById("img3"),
  document.getElementById("img4")
];

function showImagesOneByOne() {
  let delay = 0;

  images.forEach((img) => {
    setTimeout(() => {
      img.classList.add("show");
    }, delay);

    delay += 1400;
  });
}

/* 💌 open letter */
envelope.addEventListener("click", () => {

  envelope.style.opacity = "0";

  setTimeout(() => {
    envelope.style.display = "none";
    letter.style.display = "block";

    setTimeout(() => {
      letter.classList.add("show");
      typeWriter();

      setTimeout(() => {
        showImagesOneByOne();
      }, 2000);

    }, 500);

  }, 1500);
});

/* 🎵 music */
function playMusic() {
  music.play();
  document.body.classList.add("music-on");
}

/* ⌨️ text */
const text =
"I know I'm a little early for sending this, but I have to keep you on your toes. 🤍 These past 11 months have been the happiest months of my life, and I've never known a love that compares to ours. No one has ever come close to making me feel the way you do, and I truly don't think anyone ever could. Thank you for never giving up on us when things got hard, for choosing to stay, for taking care of every little piece of us, and for always making me feel loved in the smallest ways. Every memory we've made together is something I'll carry with me forever because they're moments I never want to forget. Somewhere along the way, you became so much more than just irreplaceable to me, you became a priceless masterpiece, the greatest blessing my heart has ever known. As strong as our love is, I'll admit that I still get scared sometimes. Not because I doubt you, but because losing you is the one thing I never want to experience. You're my safe place, my comfort, my best friend, and the person who makes every day feel lighter just by being in it. The thought of a future without you is something my heart can't even begin to imagine, because you've become such a huge part of who I am. Loving you isn't something I have to think about, it's as natural as breathing. Not loving you would be impossible. I can't wait for all the months and years that are still ahead of us. I want every late night conversation, every laugh until our stomachs hurt, every little moment that we'll someday look back on and smile about. Thank you for loving me, for being patient with me, and for making me believe that a love like this really exists. I will never stop choosing you, never stop being grateful for you, and never stop loving you with everything that I have. I love you more than words will ever be able to explain, Austin. Happy almost 11 months to my favorite person, here's to forever. ❤️";

let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("text").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 30);
  }
}

</script>

</body>
</html>
